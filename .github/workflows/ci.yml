name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API (Fastify + Prisma)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    env:
      # Dummy DATABASE_URL so `prisma validate` accepts the datasource block.
      # The value is not used — validate never opens a connection.
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
      JWT_SECRET: ci-secret-not-used
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - run: npm ci
      - run: npx prisma validate
      - run: npm test --if-present

  frontend:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - run: npm ci
      # Lint is non-blocking for now: the codebase has ~70 pre-existing
      # no-unused-vars / exhaustive-deps findings that pre-date Phase 2.
      # A dedicated lint-cleanup pass is tracked in ULTRA_PLAN Phase 2+.
      # Until then we want the build to gate CI, not the lint report.
      - run: npm run lint --if-present
        continue-on-error: true
      - run: npm run build

  bot:
    name: WhatsApp bot
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/whatsapp-bot
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
      WHATSAPP_API_KEY: ci-key-not-used
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/whatsapp-bot/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npx prisma validate
      - run: node --check src/index.js
      - run: node --check src/WhatsAppSession.js
      - run: node --check src/SessionManager.js

  docker-build:
    name: Docker images build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: motopartes-api:ci
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
      - name: Build Frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: false
          tags: motopartes-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
      # Bot image is skipped in CI — the chromium install pulls ~500MB and
      # adds >5 min of runtime without catching anything Dockerfile-specific
      # that node --check in the bot job misses. Re-enable if you start
      # changing the Dockerfile frequently.
