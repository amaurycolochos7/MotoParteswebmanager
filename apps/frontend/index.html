<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Service Worker: only in production, disable in dev
    if ('serviceWorker' in navigator) {
      const isDev = location.port === '5173' || location.hostname === 'localhost';
      if (isDev) {
        // FORCE unregister all SWs in development to avoid cache issues
        navigator.serviceWorker.getRegistrations().then(registrations => {
          registrations.forEach(reg => {
            reg.unregister();
            console.log('🧹 SW unregistered (dev mode)');
          });
        });
        // Also clear all caches
        caches.keys().then(names => names.forEach(name => caches.delete(name)));
      } else {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => console.log('SW registered:', registration))
            .catch(error => console.log('SW registration failed:', error));
        });
      }
    }
  </script>
