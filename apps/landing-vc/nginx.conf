server {
    listen 80;
    server_name vc.motopartes.cloud www.vc.motopartes.cloud;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip para assets estáticos
    gzip on;
    gzip_types text/plain text/css application/javascript text/html;
    gzip_min_length 1000;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # HTML: nunca cachear — siempre fresco
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # CSS y JS: revalidar con ETag (sin immutable)
    location ~* \.(css|js)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        etag on;
    }

    # Imágenes y fuentes: cache larga
    location ~* \.(png|jpg|ico|svg|woff2)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Seguridad básica
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
